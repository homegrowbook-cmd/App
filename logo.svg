<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2038;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e0f1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c83f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a61e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ball-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e05252;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b83400;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg-grad)" stroke="#2e3158" stroke-width="2"/>

  <!-- Poké Ball top half -->
  <path d="M 44 96 A 56 56 0 0 1 156 96 Z" fill="url(#ball-top)"/>
  <!-- Poké Ball bottom half -->
  <path d="M 44 96 A 56 56 0 0 0 156 96 Z" fill="#e8eaf6"/>
  <!-- Poké Ball center band -->
  <rect x="44" y="93" width="112" height="6" fill="#252745"/>
  <!-- Poké Ball center button outer -->
  <circle cx="100" cy="96" r="14" fill="#252745" stroke="#252745" stroke-width="2"/>
  <!-- Poké Ball center button inner -->
  <circle cx="100" cy="96" r="10" fill="url(#accent-grad)" filter="url(#glow)"/>
  <!-- Poké Ball center button shine -->
  <circle cx="96" cy="92" r="3" fill="rgba(255,255,255,0.4)"/>

  <!-- Crossed swords icon above the ball center -->
  <g transform="translate(100,60) rotate(-30)" filter="url(#glow)">
    <rect x="-3" y="-22" width="6" height="44" rx="2" fill="#f5c842"/>
    <rect x="-10" y="16" width="20" height="5" rx="2" fill="#7c83f5"/>
    <polygon points="0,-26 3,-14 -3,-14" fill="#f5c842"/>
  </g>
  <g transform="translate(100,60) rotate(30) scale(-1,1)" filter="url(#glow)">
    <rect x="-3" y="-22" width="6" height="44" rx="2" fill="#f5c842"/>
    <rect x="-10" y="16" width="20" height="5" rx="2" fill="#7c83f5"/>
    <polygon points="0,-26 3,-14 -3,-14" fill="#f5c842"/>
  </g>

  <!-- App name text -->
  <text x="100" y="160" font-family="'Bangers', 'Arial Black', sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle" fill="url(#accent-grad)" letter-spacing="2">PvP ADVISOR</text>
  <text x="100" y="178" font-family="'DM Sans', Arial, sans-serif" font-size="10"
        text-anchor="middle" fill="#9fa3c7" letter-spacing="1">POKÉMON GO</text>
</svg>
